name: Test

on:
  push:
    branches: [main, feat/test-phase-3]
  pull_request:
    branches: [main]

# Cancel a superseded run for the same ref so rapid PR pushes don't pile up
# Docker-heavy integration/e2e jobs. Pushes to main are never cancelled (each
# merge should leave a complete record); only branch/PR runs supersede.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build

  # Integration tests need a local Supabase (Docker). They run on PRs to main
  # and on push to main, gated behind the unit job so a broken build never
  # wastes Docker time. (Previously push-to-main only — fast PRs, but
  # integration/e2e regressions slipped through and only surfaced post-merge.)
  integration:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset
      # The test:integration script reads the service-role key from
      # `supabase status` at runtime (never committed); the publishable key and
      # localhost URL are set in vitest.integration.config.js.
      - run: npm run test:integration

  # End-to-end browser tests (Playwright + Chromium). Slow and occasionally
  # flaky; run on PRs to main and on push to main, gated behind unit +
  # integration. The dev server is started by Playwright's webServer in
  # `--mode e2e`, which loads .env.e2e (local Supabase). global-setup.js
  # provisions the test user.
  e2e:
    runs-on: ubuntu-latest
    needs: [unit, integration]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx playwright install chromium --with-deps
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset
      - run: npm run test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

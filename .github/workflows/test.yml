name: Test

on:
  push:
    branches: [main, feat/test-phase-3]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm test
      - run: npm run build

  # Integration tests need a local Supabase (Docker). They run on push to main
  # only — the Docker image pull adds ~90s, too slow for every PR. They gate on
  # the unit job so a broken build never wastes Docker time.
  integration:
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - uses: supabase/setup-cli@v2
        with:
          version: latest
      - run: supabase start
      - run: supabase db reset
      # The test:integration script reads the service-role key from
      # `supabase status` at runtime (never committed); the publishable key and
      # localhost URL are set in vitest.integration.config.js.
      - run: npm run test:integration
